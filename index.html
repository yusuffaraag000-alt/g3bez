<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>لعبة الثعبان</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; overflow: hidden; }
      #game-wrap { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 500px; padding: 10px; }
      #canvas-wrap { position: relative; border: 2px solid #444; border-radius: 15px; overflow: hidden; touch-action: none; width: 100%; }
      canvas { display: block; width: 100%; height: auto; }
      #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); }
      #ol-title { color: #fff; margin-bottom: 15px; font-size: 24px; }
      #start-btn { padding: 15px 40px; border-radius: 20px; background: #4ade80; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }
      #dpad { display: grid; grid-template-columns: 70px 70px 70px; grid-template-rows: 70px 70px 70px; gap: 10px; margin-top: 20px; }
      .dpad-btn { display: flex; align-items: center; justify-content: center; background: #222; border: 1px solid #444; border-radius: 15px; font-size: 30px; color: #fff; }
    </style>
  </head>
  <body>
    <div id="game-wrap">
      <div id="score-bar" style="color:white; margin-bottom:10px;">النقاط: <span id="score-val">0</span></div>
      <div id="canvas-wrap">
        <canvas id="gc"></canvas>
        <div id="overlay">
          <h2 id="ol-title">🐍 لعبة الثعبان</h2>
          <button id="start-btn">ابدأ اللعبة</button>
        </div>
      </div>
      <div id="dpad">
        <div class="dpad-empty"></div>
        <div class="dpad-btn" id="btn-up">▲</div>
        <div class="dpad-empty"></div>
        <div class="dpad-btn" id="btn-right">►</div>
        <div class="dpad-empty"></div>
        <div class="dpad-btn" id="btn-left">◄</div>
        <div class="dpad-empty"></div>
        <div class="dpad-btn" id="btn-down">▼</div>
        <div class="dpad-empty"></div>
      </div>
    </div>

    <script>
      const CELL = 30; // حجم الزوم
      const COLS = 15, ROWS = 15; // رقعة صغيرة
      const W = COLS * CELL, H = ROWS * CELL;

      const canvas = document.getElementById("gc");
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext("2d");

      let snake, dir, nextDir, food, score, running, interval, level;
      let headImg = new Image(), foodImg = new Image();
      headImg.src = "ثعبان.png"; foodImg.src = "اكل.png";

      function initGame() {
        snake = [{ x: 7, y: 7 }, { x: 6, y: 7 }, { x: 5, y: 7 }];
        dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 };
        score = 0; level = 1;
        document.getElementById("score-val").textContent = 0;
        placeFood();
      }

      function placeFood() { food = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) }; }
      function getSpeed() { return Math.max(50, 180 - (level - 1) * 20); }

      function startGame() {
        initGame();
        document.getElementById("overlay").style.display = "none";
        running = true;
        clearInterval(interval);
        interval = setInterval(tick, getSpeed());
      }

      function gameOver() {
        clearInterval(interval);
        running = false;
        document.getElementById("ol-title").textContent = "خسرت يا جعبز! 😂";
        document.getElementById("start-btn").textContent = "العب تاني";
        document.getElementById("overlay").style.display = "flex";
      }

      function tick() {
        dir = { ...nextDir };
        const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
        if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s => s.x === head.x && s.y === head.y)) {
           gameOver(); return;
        }
        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
           score += 10; level = Math.floor(score / 50) + 1;
           document.getElementById("score-val").textContent = score;
           placeFood();
        } else { snake.pop(); }
        draw();
      }

      function draw() {
        ctx.fillStyle = "#111"; ctx.fillRect(0, 0, W, H);
        
        // رسم الرأس
        const head = snake[0];
        ctx.save();
        ctx.translate(head.x * CELL + CELL/2, head.y * CELL + CELL/2);
        const angle = dir.x === 1 ? 0 : dir.x === -1 ? Math.PI : dir.y === 1 ? Math.PI/2 : -Math.PI/2;
        ctx.rotate(angle);
        ctx.drawImage(headImg, -CELL/2, -CELL/2, CELL, CELL);
        ctx.restore();

        // رسم الجسم
        for(let i=1; i<snake.length; i++){
            ctx.fillStyle = "#22c55e";
            ctx.fillRect(snake[i].x * CELL + 2, snake[i].y * CELL + 2, CELL - 4, CELL - 4);
        }
        
        // رسم الأكل
        ctx.drawImage(foodImg, food.x * CELL, food.y * CELL, CELL, CELL);
      }

      document.getElementById("start-btn").onclick = startGame;
      document.getElementById("btn-up").onclick = () => { if(dir.y !== 1) nextDir = {x:0, y:-1}; };
      document.getElementById("btn-down").onclick = () => { if(dir.y !== -1) nextDir = {x:0, y:1}; };
      document.getElementById("btn-left").onclick = () => { if(dir.x !== 1) nextDir = {x:-1, y:0}; };
      document.getElementById("btn-right").onclick = () => { if(dir.x !== -1) nextDir = {x:1, y:0}; };
    </script>
  </body>
</html>
